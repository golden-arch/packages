# Golden Arch — hyprlock (Everforest)

general {
    grace = 2
    hide_cursor = true
    no_fade_in = false
    disable_loading_bar = true
}

background {
    monitor =
    path = /usr/share/backgrounds/golden-arch/forest-1.jpg
    blur_passes = 3
    blur_size = 8
    contrast = 0.9
    brightness = 0.7
    vibrancy = 0.2
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(219, 188, 127, 1.0)
    font_size = 96
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B %Y')"
    color = rgba(211, 198, 170, 0.95)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}

# User avatar placeholder
label {
    monitor =
    text =   $USER
    color = rgba(167, 192, 128, 1.0)
    font_size = 18
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -60
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 320, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(167, 192, 128, 0.6)
    inner_color = rgba(45, 53, 59, 0.85)
    font_color = rgba(211, 198, 170, 1.0)
    fade_on_empty = true
    placeholder_text = <span foreground="##859289">Enter password…</span>
    hide_input = false
    rounding = 14
    check_color = rgba(219, 188, 127, 1.0)
    fail_color = rgba(230, 126, 128, 1.0)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    capslock_color = rgba(230, 152, 117, 1.0)
    position = 0, -130
    halign = center
    valign = center
}

# Footer
label {
    monitor =
    text =   Golden Arch
    color = rgba(133, 146, 137, 0.7)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, 30
    halign = center
    valign = bottom
}
