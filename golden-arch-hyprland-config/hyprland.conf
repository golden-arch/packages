# Golden Arch — Hyprland config (Everforest dark)

monitor=,preferred,auto,1

exec-once = hyprpaper
exec-once = sh -c 'until pgrep -x waybar >/dev/null; do waybar & sleep 1; pgrep -x waybar >/dev/null && break; done'
exec-once = sh -c 'sleep 2; swaync'
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

$terminal = kitty
$launcher  = rofi -show drun
$browser   = firefox
$lock      = hyprlock
$files     = dolphin

env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,kde
env = WLR_NO_HARDWARE_CURSORS,1
env = GTK_THEME,Everforest-Dark

input {
    kb_layout    = tr
    follow_mouse = 1
    sensitivity  = 0
}

general {
    gaps_in  = 6
    gaps_out = 14
    border_size = 2
    col.active_border = rgba(A7C080ff) rgba(83C092ff) 45deg
    col.inactive_border = rgba(2D353Baa)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 12
    blur {
        enabled  = true
        size     = 8
        passes   = 3
        vibrancy = 0.25
        new_optimizations = true
    }
    shadow {
        enabled = true
        range   = 24
        render_power = 3
        color   = rgba(00000099)
    }
    active_opacity   = 1.0
    inactive_opacity = 0.92
    dim_inactive     = true
    dim_strength     = 0.10
}

animations {
    enabled = true
    bezier = smooth, 0.16, 1, 0.3, 1
    bezier = snappy, 0.25, 0.1, 0.25, 1
    bezier = wind,   0.05, 0.9, 0.1, 1.05

    animation = windows,    1, 5, wind,   popin 85%
    animation = windowsOut, 1, 4, snappy, popin 85%
    animation = border,     1, 10, smooth
    animation = borderangle,1, 30, smooth, loop
    animation = fade,       1, 5, smooth
    animation = workspaces, 1, 6, smooth, slidevert
    animation = layers,     1, 4, snappy, slide top
}

dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = true
}

misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    mouse_move_enables_dpms  = true
    force_default_wallpaper  = 0
}

# Keybinds
$mod = SUPER

bind = $mod,       Return, exec, $terminal
bind = $mod,       Space,  exec, $launcher
bind = $mod,       B,      exec, $browser
bind = $mod,       E,      exec, $files
bind = $mod,       L,      exec, $lock
bind = $mod,       Q,      killactive
bind = $mod SHIFT, E,      exit
bind = $mod,       F,      fullscreen
bind = $mod,       V,      togglefloating
bind = $mod,       P,      pseudo
bind = $mod SHIFT, S,      exec, grim -g "$(slurp)" - | wl-copy
bind = $mod,       N,      exec, swaync-client -t -sw

bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Volume / brightness
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
